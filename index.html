<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FFF5F8">
  <title>まいにち ✿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    :root {
      --rose:     #F2A7BF;
      --rose-l:   #FDE8F0;
      --lavender: #C2AEE0;
      --lav-l:    #EDE8FA;
      --sage:     #9EC5B4;
      --sage-l:   #DFF0EA;
      --aqua:     #8FC4D8;
      --aqua-l:   #DCF0F8;
      --text:     #5C4970;
      --text-sub: #A094B8;
      --card:     rgba(255,255,255,0.88);
      --shadow:   0 4px 24px rgba(160,130,190,0.13);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #FFF5F8 0%, #F0EAFB 100%);
      color: var(--text);
      padding-bottom: 110px;
      overflow-x: hidden;
    }
    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
    }
    body::before { width: 320px; height: 320px; top: -80px; right: -80px; background: radial-gradient(circle, rgba(242,167,191,0.18) 0%, transparent 70%); }
    body::after  { width: 260px; height: 260px; bottom: 100px; left: -60px; background: radial-gradient(circle, rgba(194,174,224,0.18) 0%, transparent 70%); }

    /* ── ヘッダー ── */
    .header { position: relative; z-index: 1; padding: 52px 24px 16px; text-align: center; }
    .greeting { font-size: 13px; font-weight: 500; color: var(--text-sub); letter-spacing: 0.08em; margin-bottom: 6px; }
    .date-display { font-size: 30px; font-weight: 800; color: var(--text); }
    .deco-row { margin-top: 12px; font-size: 18px; letter-spacing: 10px; color: var(--rose); opacity: 0.7; }

    /* ── ビュータブ ── */
    .view-tabs {
      position: relative; z-index: 1; display: flex;
      margin: 16px 20px 0;
      background: rgba(255,255,255,0.6); border-radius: 16px;
      padding: 4px; box-shadow: 0 2px 12px rgba(160,130,190,0.1);
    }
    .view-tab {
      flex: 1; padding: 10px; border: none; background: none;
      border-radius: 12px; font-family: inherit; font-size: 13px; font-weight: 700;
      color: var(--text-sub); cursor: pointer; transition: all 0.22s;
    }
    .view-tab.active { background: white; color: var(--text); box-shadow: 0 2px 10px rgba(160,130,190,0.18); }

    /* ── 進捗カード ── */
    .progress-card {
      position: relative; z-index: 1;
      margin: 16px 20px 20px; background: var(--card);
      border-radius: 22px; padding: 18px 20px;
      box-shadow: var(--shadow); display: flex; align-items: center; gap: 18px;
    }
    .progress-left { flex: 1; min-width: 0; }
    .progress-label { font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.08em; margin-bottom: 10px; }

    /* キャラクターバー */
    .progress-bar-wrapper { position: relative; padding-bottom: 22px; }
    .progress-bar-bg { height: 9px; background: #EDE8F5; border-radius: 100px; overflow: visible; position: relative; }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--rose), var(--lavender));
      border-radius: 100px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    .p-char {
      position: absolute;
      top: 50%; transform: translate(-50%, -50%);
      width: 32px; height: 32px; border-radius: 50%;
      background: white; box-shadow: 0 3px 12px rgba(160,130,190,0.32);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; z-index: 2; pointer-events: none;
      transition: left 0.6s cubic-bezier(0.4,0,0.2,1);
      animation: charBob 2.4s ease-in-out infinite;
    }
    @keyframes charBob {
      0%, 100% { transform: translate(-50%, -50%); }
      50%       { transform: translate(-50%, calc(-50% - 6px)); }
    }
    @keyframes charCelebrate {
      0%   { transform: translate(-50%,-50%) scale(1) rotate(0deg); }
      25%  { transform: translate(-50%,-50%) scale(1.5) rotate(-10deg); }
      50%  { transform: translate(-50%,-50%) scale(1.4) rotate(10deg); }
      75%  { transform: translate(-50%,-50%) scale(1.5) rotate(-5deg); }
      100% { transform: translate(-50%,-50%) scale(1) rotate(0deg); }
    }

    .p-char-msg {
      position: absolute; bottom: 0; left: 0; right: 0;
      font-size: 11px; font-weight: 600; color: var(--text-sub);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: opacity 0.4s;
    }

    .progress-right { text-align: right; flex-shrink: 0; }
    .progress-done  { font-size: 26px; font-weight: 800; color: var(--text); line-height: 1; }
    .progress-total { font-size: 12px; font-weight: 500; color: var(--text-sub); margin-top: 2px; }

    /* ── セクション ── */
    .section { position: relative; z-index: 1; margin: 0 20px 18px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 6px; }
    .section-title  { font-size: 14px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .section-sub    { font-size: 10px; font-weight: 600; color: var(--aqua); background: var(--aqua-l); padding: 2px 8px; border-radius: 100px; }
    .section-pill   { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 100px; background: var(--rose); color: white; min-width: 24px; text-align: center; }
    .section-pill.daily { background: var(--aqua); }
    .section-pill.week  { background: var(--sage); }
    .section-pill.soon  { background: var(--lavender); }

    .task-card { background: var(--card); border-radius: 22px; padding: 6px; box-shadow: var(--shadow); }

    /* ── タスクアイテム ── */
    .task-item {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 10px 10px 6px; border-radius: 16px;
      transition: background 0.15s;
      animation: fadeSlide 0.28s ease both;
    }
    .task-item:active { background: rgba(0,0,0,0.025); }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ドラッグハンドル */
    .drag-handle {
      flex-shrink: 0; width: 22px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      color: #D8CEE8; cursor: grab; touch-action: none;
      border-radius: 6px; transition: color 0.18s, background 0.18s;
    }
    .drag-handle:hover  { color: var(--lavender); background: var(--lav-l); }
    .drag-handle:active { cursor: grabbing; }

    /* Sortableクラス */
    .sort-ghost  { opacity: 0.4; background: var(--lav-l) !important; border-radius: 16px; }
    .sort-chosen { background: rgba(194,174,224,0.07); }

    .cb {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2.5px solid var(--rose); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; background: white;
      transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    .cb.daily { border-color: var(--aqua); }
    .cb.week  { border-color: var(--sage); }
    .cb.soon  { border-color: var(--lavender); }
    .cb.done  { background: var(--rose); border-color: var(--rose); transform: scale(1.08); }
    .cb.done.daily { background: var(--aqua);     border-color: var(--aqua); }
    .cb.done.week  { background: var(--sage);     border-color: var(--sage); }
    .cb.done.soon  { background: var(--lavender); border-color: var(--lavender); }
    .cb svg { opacity: 0; transition: opacity 0.18s; }
    .cb.done svg { opacity: 1; }

    .task-text { flex: 1; font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.45; word-break: break-all; transition: color 0.2s; }
    .task-text.done { text-decoration: line-through; color: var(--text-sub); }

    .icon-btn {
      flex-shrink: 0; width: 28px; height: 28px;
      border: none; background: none; cursor: pointer;
      color: #D0C6E8; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: color 0.18s, background 0.18s;
    }
    .icon-btn.edit:hover { color: var(--lavender); background: var(--lav-l); }
    .icon-btn.del:hover  { color: var(--rose);     background: var(--rose-l); }

    .empty-state { text-align: center; padding: 22px 16px; color: var(--text-sub); font-size: 13px; font-weight: 500; }
    .empty-state .e { font-size: 26px; display: block; margin-bottom: 6px; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 34px; right: 24px;
      width: 62px; height: 62px; border-radius: 50%; border: none; cursor: pointer;
      background: linear-gradient(135deg, #F2A7BF 0%, #C2AEE0 100%);
      box-shadow: 0 8px 28px rgba(200,140,190,0.42);
      color: white; font-size: 30px; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; line-height: 1;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s;
    }
    .fab:active { transform: scale(0.9); box-shadow: 0 4px 14px rgba(200,140,190,0.28); }

    /* ── オーバーレイ・シート ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(80,60,100,0.28);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #FFFCFF; border-radius: 28px 28px 0 0;
      padding: 12px 24px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 32px);
      z-index: 201; transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.32,0.72,0,1);
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle { width: 38px; height: 4px; background: #E8E0F2; border-radius: 100px; margin: 0 auto 22px; }
    .sheet-title  { font-size: 18px; font-weight: 800; color: var(--text); text-align: center; margin-bottom: 20px; }

    .cat-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .cat-btn {
      flex: 1 0 calc(50% - 4px); padding: 11px 8px;
      border-radius: 14px; border: 2.5px solid #EAE3F5;
      background: white; font-family: inherit; font-size: 13px; font-weight: 700;
      color: var(--text-sub); cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .cat-btn.sel-daily    { border-color: var(--aqua);     background: var(--aqua-l); color: var(--text); }
    .cat-btn.sel-today    { border-color: var(--rose);     background: var(--rose-l); color: var(--text); }
    .cat-btn.sel-week     { border-color: var(--sage);     background: var(--sage-l); color: var(--text); }
    .cat-btn.sel-soon     { border-color: var(--lavender); background: var(--lav-l);  color: var(--text); }

    .task-input {
      width: 100%; padding: 15px 18px; border-radius: 16px;
      border: 2.5px solid #EAE3F5; background: #FAF8FD;
      font-family: inherit; font-size: 16px; color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    .task-input:focus { border-color: var(--lavender); }
    .task-input::placeholder { color: var(--text-sub); }

    .primary-btn {
      display: block; width: 100%; margin-top: 14px; padding: 17px;
      border: none; border-radius: 18px;
      background: linear-gradient(135deg, var(--rose), var(--lavender));
      color: white; font-family: inherit; font-size: 16px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.05em;
      transition: opacity 0.18s, transform 0.12s;
      box-shadow: 0 6px 18px rgba(200,140,190,0.3);
    }
    .primary-btn:active { opacity: 0.85; transform: scale(0.98); }

    /* ── トースト ── */
    .toast {
      position: fixed; bottom: 110px;
      left: 50%; transform: translateX(-50%) translateY(10px);
      background: rgba(92,73,112,0.92); color: white;
      font-size: 13px; font-weight: 600;
      padding: 10px 20px; border-radius: 100px;
      z-index: 300; white-space: nowrap;
      opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── カレンダービュー ── */
    #view-calendar { position: relative; z-index: 1; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin: 16px 20px 12px; }
    .cal-nav-btn {
      width: 38px; height: 38px; border: none; border-radius: 50%;
      background: var(--card); box-shadow: var(--shadow);
      cursor: pointer; font-size: 18px; color: var(--text);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .cal-nav-btn:active { transform: scale(0.92); }
    .cal-month-label { font-size: 18px; font-weight: 800; color: var(--text); }
    .cal-card { margin: 0 20px; background: var(--card); border-radius: 22px; padding: 16px; box-shadow: var(--shadow); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day-header { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-sub); padding: 4px 0 8px; }
    .cal-day-header:first-child { color: #E8698A; }
    .cal-day-header:last-child  { color: var(--aqua); }
    .cal-cell {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 40px; border-radius: 10px; cursor: pointer;
      transition: background 0.15s; gap: 3px;
    }
    .cal-cell:not(.empty):hover { background: rgba(0,0,0,0.04); }
    .cal-cell.empty { cursor: default; }
    .cal-cell span { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1; }
    .cal-cell.today span {
      background: linear-gradient(135deg, var(--rose), var(--lavender));
      color: white; width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-weight: 800;
    }
    .cal-cell.selected:not(.today) { background: var(--lav-l); }
    .cal-cell.selected.today span  { box-shadow: 0 0 0 3px var(--lavender); }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--rose); }
    .cal-detail { margin: 14px 20px 0; background: var(--card); border-radius: 22px; padding: 18px 20px; box-shadow: var(--shadow); min-height: 80px; }
    .cal-detail-header { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
    .cal-hint { text-align: center; padding: 10px; color: var(--text-sub); font-size: 13px; }
    .cal-task-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 12px; transition: background 0.15s; animation: fadeSlide 0.25s ease both; }
    .cal-task-item:hover { background: rgba(0,0,0,0.03); }
    .cal-task-emoji { font-size: 15px; flex-shrink: 0; }
    .cal-task-text  { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); word-break: break-all; }
    .cal-task-cat   { font-size: 10px; font-weight: 700; color: var(--text-sub); background: #F0EAF8; padding: 2px 8px; border-radius: 100px; flex-shrink: 0; }
  </style>
</head>
<body>

  <header class="header">
    <div class="greeting" id="greeting"></div>
    <div class="date-display" id="dateDisplay"></div>
    <div class="deco-row">✿ ✦ ✿</div>
  </header>

  <div class="view-tabs">
    <button class="view-tab active" data-view="list">📋 リスト</button>
    <button class="view-tab" data-view="calendar">📅 カレンダー</button>
  </div>

  <!-- ── リストビュー ── -->
  <div id="view-list">
    <div class="progress-card">
      <div class="progress-left">
        <div class="progress-label">TODAY'S PROGRESS</div>
        <div class="progress-bar-wrapper">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="pBar" style="width:0%"></div>
          </div>
          <div class="p-char" id="pChar" style="left:15px">💤</div>
          <div class="p-char-msg" id="pCharMsg">今日もがんばろう！</div>
        </div>
      </div>
      <div class="progress-right">
        <div class="progress-done" id="pDone">0</div>
        <div class="progress-total" id="pTotal">/ 0 完了</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">🔄 毎日リスト <span class="section-sub">毎日自動リセット</span> <span class="section-pill daily" id="p-daily">0</span></div>
      </div>
      <div class="task-card"><div id="list-daily"></div></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">🌸 今日やること <span class="section-pill" id="p-today">0</span></div>
      </div>
      <div class="task-card"><div id="list-today"></div></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">🌿 今週中に <span class="section-pill week" id="p-week">0</span></div>
      </div>
      <div class="task-card"><div id="list-week"></div></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">✨ そのうちに <span class="section-pill soon" id="p-soon">0</span></div>
      </div>
      <div class="task-card"><div id="list-soon"></div></div>
    </div>
  </div>

  <!-- ── カレンダービュー ── -->
  <div id="view-calendar" style="display:none">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="calPrev">‹</button>
      <div class="cal-month-label" id="calMonthLabel"></div>
      <button class="cal-nav-btn" id="calNext">›</button>
    </div>
    <div class="cal-card"><div class="cal-grid" id="calGrid"></div></div>
    <div class="cal-detail" id="calDetail">
      <div class="cal-hint">日付を選ぶと完了タスクが見られるよ ✦</div>
    </div>
  </div>

  <button class="fab" id="fab">＋</button>
  <div class="overlay" id="overlay"></div>

  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">タスクを追加 ✦</div>
    <div class="cat-row">
      <button class="cat-btn" id="btn-daily" data-cat="daily">🔄 毎日リスト</button>
      <button class="cat-btn" id="btn-today" data-cat="today">🌸 今日やること</button>
      <button class="cat-btn" id="btn-week"  data-cat="week">🌿 今週中に</button>
      <button class="cat-btn" id="btn-soon"  data-cat="soon">✨ そのうちに</button>
    </div>
    <input class="task-input" id="taskInput" type="text" placeholder="やることを入力..." maxlength="120" enterkeyhint="done">
    <button class="primary-btn" id="submitBtn">追加する ✦</button>
  </div>

  <div class="toast" id="toast"></div>

<script>
  /* ──────── データ ──────── */
  const STORE = 'mainichi-v2';
  let db;
  let selCat = 'today';
  let editTarget = null;
  let calYear, calMonth, calSelDate;

  const CATS       = ['daily','today','week','soon'];
  const EMPTY_EMOJI = { daily:'🔄', today:'🌸', week:'🌿', soon:'✨' };
  const EMPTY_MSG   = { daily:'毎日のルーティンを追加しよう', today:'今日のタスクを追加しよう', week:'今週の予定を追加しよう', soon:'やりたいことを追加しよう' };
  const CAT_LABEL   = { daily:'毎日', today:'今日', week:'今週', soon:'そのうち' };
  const CAT_EMOJI   = { daily:'🔄', today:'🌸', week:'🌿', soon:'✨' };
  const DAYS        = ['日','月','火','水','木','金','土'];

  /* キャラクター進捗ステート */
  const CHAR_STATES = [
    { max: 0,   char: '💤', msg: '今日もがんばろう！' },
    { max: 24,  char: '🌱', msg: 'スタートだよ！' },
    { max: 49,  char: '🐣', msg: 'いい感じ〜！' },
    { max: 74,  char: '🌸', msg: 'もう少しだよ！' },
    { max: 99,  char: '🎉', msg: 'あとちょっと！すごい！' },
    { max: 100, char: '🌟', msg: '全部完了！やった〜！' },
  ];

  function defaultDB() {
    return { daily:[], today:[], week:[], soon:[], history:{}, scheduled:{}, lastDate:null };
  }

  function loadDB() {
    try {
      const s = localStorage.getItem(STORE);
      db = s ? { ...defaultDB(), ...JSON.parse(s) } : defaultDB();
      if (!s) {
        const old = localStorage.getItem('mainichi-v1');
        if (old) {
          try { const o=JSON.parse(old); db.today=o.today||[]; db.week=o.week||[]; db.soon=o.soon||[]; } catch(e){}
        }
      }
    } catch(e) { db = defaultDB(); }
  }

  function saveDB() { localStorage.setItem(STORE, JSON.stringify(db)); }

  function fmtDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function todayStr()    { return fmtDate(new Date()); }
  function tomorrowStr() { const d=new Date(); d.setDate(d.getDate()+1); return fmtDate(d); }
  function genId()       { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

  /* ── 日次リセット ── */
  function dailyReset() {
    const today = todayStr();
    if (db.lastDate === today) return;
    db.daily.forEach(t => t.done = false);
    db.today = db.today.filter(t => !t.done);
    db.week  = db.week.filter(t => !t.done);
    db.soon  = db.soon.filter(t => !t.done);
    const sched = db.scheduled[today] || [];
    sched.forEach(s => db.today.push({ id: genId(), text: s.text, done: false }));
    if (sched.length) delete db.scheduled[today];
    db.lastDate = today;
    saveDB();
  }

  /* ──────── レンダリング ──────── */
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const DRAG_HANDLE_SVG = `
    <svg width="10" height="14" viewBox="0 0 10 14" fill="currentColor">
      <circle cx="3" cy="2.5" r="1.4"/><circle cx="7" cy="2.5" r="1.4"/>
      <circle cx="3" cy="7"   r="1.4"/><circle cx="7" cy="7"   r="1.4"/>
      <circle cx="3" cy="11.5" r="1.4"/><circle cx="7" cy="11.5" r="1.4"/>
    </svg>`;

  function renderList(cat) {
    const items = db[cat];
    const el    = document.getElementById('list-'+cat);
    document.getElementById('p-'+cat).textContent = items.filter(t=>!t.done).length;

    if (!items.length) {
      el.innerHTML = `<div class="empty-state"><span class="e">${EMPTY_EMOJI[cat]}</span>${EMPTY_MSG[cat]}</div>`;
      return;
    }
    el.innerHTML = '';
    items.forEach(t => {
      const div = document.createElement('div');
      div.className = 'task-item';
      div.innerHTML = `
        <div class="drag-handle" title="ドラッグして並び替え">${DRAG_HANDLE_SVG}</div>
        <div class="cb ${cat}${t.done?' done':''}" data-action="toggle" data-cat="${cat}" data-id="${t.id}">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M2 6.5L5.5 10L11 3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="task-text${t.done?' done':''}">${esc(t.text)}</div>
        <button class="icon-btn edit" data-action="edit" data-cat="${cat}" data-id="${t.id}" aria-label="編集">✏️</button>
        <button class="icon-btn del"  data-action="del"  data-cat="${cat}" data-id="${t.id}" aria-label="削除">✕</button>
      `;
      el.appendChild(div);
    });
  }

  /* ── Sortable ── */
  function initSortable(cat) {
    const container = document.getElementById('list-'+cat);
    if (!container) return;
    if (container._sortableInst) { container._sortableInst.destroy(); container._sortableInst = null; }
    if (!db[cat].length) return;

    container._sortableInst = new Sortable(container, {
      animation: 200,
      ghostClass: 'sort-ghost',
      chosenClass: 'sort-chosen',
      handle: '.drag-handle',
      onEnd(evt) {
        if (evt.oldIndex === evt.newIndex) return;
        const [moved] = db[cat].splice(evt.oldIndex, 1);
        db[cat].splice(evt.newIndex, 0, moved);
        saveDB();
      }
    });
  }

  /* ── 進捗・キャラクター ── */
  let prevPct = -1;

  function updateProgress() {
    const all   = [...db.daily, ...db.today];
    const total = all.length;
    const done  = all.filter(t=>t.done).length;
    const pct   = total ? Math.round(done/total*100) : 0;

    document.getElementById('pBar').style.width   = pct+'%';
    document.getElementById('pDone').textContent  = done;
    document.getElementById('pTotal').textContent = `/ ${total} 完了`;

    const state  = CHAR_STATES.find(s => pct <= s.max) || CHAR_STATES[CHAR_STATES.length-1];
    const charEl = document.getElementById('pChar');
    const msgEl  = document.getElementById('pCharMsg');

    charEl.textContent = state.char;
    msgEl.textContent  = state.msg;

    const leftVal = total === 0 ? '15px' : `clamp(15px, ${pct}%, calc(100% - 15px))`;
    charEl.style.left  = leftVal;

    // 100%達成アニメーション
    if (pct === 100 && prevPct !== 100) {
      charEl.style.animation = 'charCelebrate 0.6s ease-out';
      setTimeout(() => { charEl.style.animation = ''; }, 700);
    }
    prevPct = pct;
  }

  function renderAll() {
    CATS.forEach(cat => { renderList(cat); initSortable(cat); });
    updateProgress();
  }

  /* ──────── タスク操作 ──────── */
  function toggleTask(cat, id) {
    const task = db[cat].find(t=>t.id===id);
    if (!task) return;
    task.done = !task.done;
    const today = todayStr();
    db.history[today] = db.history[today] || [];
    if (task.done) {
      if (!db.history[today].find(h=>h.id===id))
        db.history[today].push({ id, text: task.text, cat });
    } else {
      db.history[today] = db.history[today].filter(h=>h.id!==id);
      if (!db.history[today].length) delete db.history[today];
    }
    saveDB(); renderAll();
  }

  function checkMeinichi(text) {
    if (!text.includes('明日')) return;
    const tmr = tomorrowStr();
    db.scheduled[tmr] = db.scheduled[tmr] || [];
    db.scheduled[tmr].push({ id: genId(), text });
    showToast('明日の今日やることにも追加したよ ✦');
  }

  function doAdd(cat, text) {
    db[cat].push({ id: genId(), text, done: false });
    checkMeinichi(text); saveDB(); renderAll();
  }

  function doEdit(cat, id, newCat, newText) {
    const task = db[cat].find(t=>t.id===id);
    if (!task) return;
    if (cat === newCat) {
      task.text = newText;
    } else {
      db[cat] = db[cat].filter(t=>t.id!==id);
      db[newCat].push({ id, text: newText, done: task.done });
      Object.values(db.history).forEach(arr => {
        const h = arr.find(h=>h.id===id);
        if (h) { h.text = newText; h.cat = newCat; }
      });
    }
    checkMeinichi(newText); saveDB(); renderAll();
  }

  function doDelete(cat, id) {
    db[cat] = db[cat].filter(t=>t.id!==id);
    Object.keys(db.history).forEach(d => {
      db.history[d] = db.history[d].filter(h=>h.id!==id);
      if (!db.history[d].length) delete db.history[d];
    });
    saveDB(); renderAll();
  }

  /* ── イベント委譲 ── */
  document.addEventListener('click', e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const { action, cat, id } = el.dataset;
    if (action === 'toggle') { toggleTask(cat, id); return; }
    if (action === 'edit')   { openEditSheet(cat, id); return; }
    if (action === 'del')    { doDelete(cat, id); return; }
  });

  /* ──────── シート ──────── */
  function selectCat(cat) {
    selCat = cat;
    CATS.forEach(c => {
      const btn = document.getElementById('btn-'+c);
      if (btn) btn.className = 'cat-btn'+(c===cat ? ` sel-${cat}` : '');
    });
  }

  function openSheet() {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('sheet').classList.add('open');
  }
  function closeSheet() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('sheet').classList.remove('open');
    editTarget = null;
  }

  function openAddSheet() {
    editTarget = null;
    document.getElementById('sheetTitle').textContent = 'タスクを追加 ✦';
    document.getElementById('submitBtn').textContent  = '追加する ✦';
    document.getElementById('taskInput').value = '';
    selectCat('today'); openSheet();
    setTimeout(() => document.getElementById('taskInput').focus(), 380);
  }

  function openEditSheet(cat, id) {
    const task = db[cat].find(t=>t.id===id);
    if (!task) return;
    editTarget = { cat, id };
    document.getElementById('sheetTitle').textContent = 'タスクを編集 ✦';
    document.getElementById('submitBtn').textContent  = '更新する ✦';
    document.getElementById('taskInput').value = task.text;
    selectCat(cat); openSheet();
    setTimeout(() => {
      const inp = document.getElementById('taskInput');
      inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length);
    }, 400);
  }

  function submitSheet() {
    const text = document.getElementById('taskInput').value.trim();
    if (!text) { document.getElementById('taskInput').focus(); return; }
    if (editTarget) doEdit(editTarget.cat, editTarget.id, selCat, text);
    else            doAdd(selCat, text);
    closeSheet();
  }

  document.getElementById('fab').addEventListener('click', openAddSheet);
  document.getElementById('overlay').addEventListener('click', closeSheet);
  document.getElementById('submitBtn').addEventListener('click', submitSheet);
  document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key==='Enter') submitSheet(); });
  document.querySelectorAll('.cat-btn').forEach(btn => btn.addEventListener('click', () => selectCat(btn.dataset.cat)));

  /* ──────── ビュー切替 ──────── */
  document.querySelectorAll('.view-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const view = tab.dataset.view;
      document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t===tab));
      document.getElementById('view-list').style.display     = view==='list'     ? '' : 'none';
      document.getElementById('view-calendar').style.display = view==='calendar' ? '' : 'none';
      document.getElementById('fab').style.display           = view==='list'     ? '' : 'none';
      if (view==='calendar') renderCalendar();
    });
  });

  /* ──────── カレンダー ──────── */
  const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  function renderCalendar() {
    const now = new Date();
    if (calYear===undefined)  calYear  = now.getFullYear();
    if (calMonth===undefined) calMonth = now.getMonth();
    document.getElementById('calMonthLabel').textContent = `${calYear}年 ${MONTH_NAMES[calMonth]}`;

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    DAYS.forEach(d => { const el=document.createElement('div'); el.className='cal-day-header'; el.textContent=d; grid.appendChild(el); });

    const firstDow    = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
    const today       = todayStr();

    for (let i=0; i<firstDow; i++) { const el=document.createElement('div'); el.className='cal-cell empty'; grid.appendChild(el); }

    for (let d=1; d<=daysInMonth; d++) {
      const ds      = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const hasHist = (db.history[ds]||[]).length > 0;
      const isToday = ds === today;
      const isSel   = ds === calSelDate;
      const el = document.createElement('div');
      el.className = `cal-cell${isToday?' today':''}${isSel?' selected':''}`;
      el.innerHTML = `<span>${d}</span>${hasHist?'<div class="cal-dot"></div>':''}`;
      el.addEventListener('click', () => { calSelDate=ds; renderCalendar(); renderDayDetail(); });
      grid.appendChild(el);
    }
    renderDayDetail();
  }

  function renderDayDetail() {
    const panel = document.getElementById('calDetail');
    if (!calSelDate) { panel.innerHTML='<div class="cal-hint">日付を選ぶと完了タスクが見られるよ ✦</div>'; return; }
    const tasks     = db.history[calSelDate] || [];
    const [y,m,d]   = calSelDate.split('-').map(Number);
    const dow       = new Date(y, m-1, d).getDay();
    if (!tasks.length) {
      panel.innerHTML = `<div class="cal-detail-header">${m}月${d}日（${DAYS[dow]}）</div><div class="cal-hint">この日の完了タスクはないよ ✦</div>`;
      return;
    }
    panel.innerHTML = `
      <div class="cal-detail-header">${m}月${d}日（${DAYS[dow]}）の完了タスク ✓</div>
      ${tasks.map(t=>`
        <div class="cal-task-item">
          <span class="cal-task-emoji">${CAT_EMOJI[t.cat]||'✦'}</span>
          <span class="cal-task-text">${esc(t.text)}</span>
          <span class="cal-task-cat">${CAT_LABEL[t.cat]||''}</span>
        </div>
      `).join('')}`;
  }

  document.getElementById('calPrev').addEventListener('click', () => {
    calMonth--; if (calMonth<0) { calMonth=11; calYear--; } calSelDate=null; renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', () => {
    calMonth++; if (calMonth>11) { calMonth=0; calYear++; } calSelDate=null; renderCalendar();
  });

  /* ──────── トースト ──────── */
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }

  /* ──────── ヘッダー ──────── */
  function setHeader() {
    const now = new Date(), h = now.getHours();
    const greet = h<5?'おやすみなさい 🌙':h<12?'おはようございます ☀️':h<17?'こんにちは 🌸':h<21?'こんばんは 🌙':'お疲れさまです ✦';
    document.getElementById('greeting').textContent    = greet;
    document.getElementById('dateDisplay').textContent = `${now.getMonth()+1}月${now.getDate()}日（${DAYS[now.getDay()]}）`;
  }

  /* ──────── 初期化 ──────── */
  setHeader();
  loadDB();
  dailyReset();
  renderAll();
</script>
</body>
</html>
